version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fieldio_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fieldio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fieldio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: fieldio_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fieldio_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: fieldio_adminer
    ports:
      - "8080:8080"
    networks:
      - fieldio_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  fieldio_network:
    driver: bridge
